<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑄瑄3C | 影像與飛行的專家</title>
    <style>
        :root { --main-blue: #00e6ff; --line-green: #06C755; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: white; font-family: sans-serif; }
        
        /* 導航 */
        header { 
            position: fixed; top: 0; width: 100%; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 999; border-bottom: 1px solid #333;
        }
        .logo { font-size: 20px; font-weight: bold; color: var(--main-blue); text-decoration: none; }

        /* 核心區塊：解決全黑問題 */
        .hero { 
            width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            /* 修正：先給一個深色漸層底色，再跑圖片 */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        #1a1a1a url('https://w0.peakpx.com/wallpaper/515/795/HD-wallpaper-dji-mavic-3-drone-pro-camera.jpg');
            background-size: cover;
            background-position: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero-box {
            background: rgba(0,0,0,0.6);
            padding: 30px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            width: 100%;
            max-width: 350px;
        }

        h1 { font-size: 40px; margin: 0 0 10px 0; text-shadow: 0 0 20px var(--main-blue); }
        p { font-size: 16px; margin-bottom: 30px; color: #ccc; }

        /* 按鈕優化 */
        .btn-group { display: flex; gap: 10px; }
        .btn { 
            flex: 1; padding: 15px 0; border-radius: 10px; 
            text-decoration: none; font-weight: bold; text-align: center;
            transition: 0.2s;
        }
        .btn-blue { background: var(--main-blue); color: #000; }
        .btn-green { background: var(--line-green); color: #fff; }
        .btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

<header>
    <a href="#" class="logo">瑄瑄3C</a>
    <div style="font-size: 12px; color: #888;">專業零售 | 空拍代飛</div>
</header>

<section class="hero">
    <div class="hero-box">
        <h1>瑄瑄3C</h1>
        <p>捕捉不可能的視角<br>體驗未來的視覺科技</p>
        <div class="btn-group">
            <a href="#" class="btn btn-blue">產品展示</a>
            <a href="https://line.me/R/ti/p/@您的ID" class="btn btn-green">代飛報價</a>
        </div>
    </div>
</section>

</body>
</html>
