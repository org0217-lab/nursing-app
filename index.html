<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中山醫管路維護系統</title>
    <style>
        :root { --primary: #007AFF; --danger: #FF3B30; --success: #34C759; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 12px; -webkit-text-size-adjust: 100%; }
        
        /* 雙 Logo 標題區塊 */
        .header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 10px;
            background: white;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .header img { 
            height: 45px; 
            width: 45px; 
            object-fit: cover; 
            border-radius: 10px; 
            border: 1px solid #EEE;
        }
        .header h2 { 
            margin: 0; 
            font-size: 18px; 
            color: #1C1C1E; 
            flex-grow: 1; 
            text-align: center;
            font-weight: 800;
        }

        #loader { display: none; text-align: center; color: var(--primary); font-size: 13px; font-weight: bold; margin-bottom: 10px; }
        .add-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,122,255,0.2); cursor: pointer; }
        
        /* 病患卡片設計 */
        .patient-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; flex-direction: column; border-left: 8px solid var(--success); box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; position: relative; }
        .patient-item.urgent { border-left-color: var(--danger); background: #FFF5F5; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .info b { font-size: 19px; color: #1C1C1E; display: block; }
        .date-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; margin-top: 8px; }
        .date-row { display: contents; font-size: 13px; }
        .date-label { color: #8E8E93; font-weight: 500; }
        .date-value { font-family: monospace; color: #3A3A3C; font-weight: bold; }
        .tube-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 5px; background: #E5E5EA; color: #3A3A3C; }
        .status-badge { position: absolute; top: 15px; right: 15px; font-size: 11px; padding: 4px 8px; border-radius: 6px; background: #E5E5EA; color: #3A3A3C; font-weight: bold; }
        .urgent .status-badge { background: var(--danger); color: white; }

        /* 編輯視窗 */
        #editor { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal { background: white; width: 92%; max-width: 450px; padding: 20px; border-radius: 20px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
        label { display: block; margin-top: 12px; font-size: 13px; color: #8E8E93; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #D1D1D6; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #F9F9F9; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .save { background: var(--primary); color: white; flex: 2; border: none; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 16px; }
        .cancel { background: #E5E5EA; color: #333; flex: 1; border: none; padding: 12px; border-radius: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/zh/thumb/e/ee/Chung_Shan_Medical_University_seal.svg/1280px-Chung_Shan_Medical_University_seal.svg.png" alt="CSMU">
            <h2>管路維護雲端版</h2>
            <img src="logo.png" alt="Cat">
        </div>
        
        <div id="loader">⌛ 同步雲端資料中...</div>
