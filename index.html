<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>臨床管路管理系統</title>
    <style>
        :root { --primary: #007AFF; --danger: #FF3B30; --success: #34C759; --bg: #F2F2F7; --csmu-red: #8B0000; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 12px; -webkit-text-size-adjust: 100%; overflow-x: hidden; }
        
        /* 中山醫開場特效 */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.5s;
        }
        .splash-logo { width: 120px; height: 120px; margin-bottom: 20px; animation: logo-entrance 1.2s ease-out forwards; opacity: 0; }
        .splash-text { color: var(--csmu-red); font-size: 24px; font-weight: 900; opacity: 0; animation: text-fadein 1s ease-out 0.5s forwards; }
        @keyframes logo-entrance { 0% { transform: scale(0.5); opacity: 0; filter: blur(10px); } 100% { transform: scale(1); opacity: 1; filter: blur(0); } }
        @keyframes text-fadein { 0% { transform: translateY(10px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .splash-hidden { transform: translateY(-100%) !important; opacity: 0; pointer-events: none; }

        /* 主介面樣式 */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: white; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header img { height: 50px; width: 50px; object-fit: cover; border-radius: 12px; }
        .header h2 { margin: 0; font-size: 18px; color: #1C1C1E; flex-grow: 1; text-align: center; font-weight: 800; line-height: 1.2; }
        
        .user-info { text-align: center; font-size: 12px; color: #8E8E93; margin-bottom: 10px; }
        .user-info span { color: var(--primary); font-weight: bold; text-decoration: underline; cursor: pointer; }

        #loader { display: none; text-align: center; color: var(--primary); font-size: 13px; font-weight: bold; margin-bottom: 10px; }
        .add-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; margin-bottom: 20px; cursor: pointer; }
        
        .patient-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; flex-direction: column; border-left: 8px solid var(--success); box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; position: relative; }
        .patient-item.urgent { border-left-color: var(--danger); background: #FFF5F5; }
        .info b { font-size: 19px; color: #1C1C1E; display: block; }
        .date-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; margin-top: 8px; }
        .date-row { display: contents; font-size: 13px; }
        .date-label { color: #8E8E93; min-width: 40px; }
        .date-value { color: #3A3A3C; font-weight: bold; }
        .tube-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #E5E5EA; margin-top: 5px; }
        .status-badge { position: absolute; top: 15px; right: 15px; font-size: 11px; padding: 4px 8px; border-radius: 6px; background: #E5E5EA; font-weight: bold; }
        .urgent .status-badge { background: var(--danger); color: white; }

        /* 彈出視窗 */
        #editor { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal { background: white; width: 92%; max-width: 450px; padding: 20px; border-radius: 20px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
        label { display: block; margin-top: 12px; font-size: 13px; color: #8E8E93; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #D1D1D6; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .save { background: var(--primary); color: white; flex: 2; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
        .cancel { background: #E5E5EA; flex: 1; border: none; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://upload.wikimedia.org/wikipedia/zh/thumb/e/ee/Chung_Shan_Medical_University_seal.svg/1280px-Chung_Shan_Medical_University_seal.svg.png" class="splash-logo">
        <div class="splash-text">中山醫學大學</div>
    </div>

    <div class="container">
        <div class="header">
            <img src="logo.png" alt="Left">
            <h2>臨床管路<br>追蹤管理系統</h2>
            <img src="logo.png" alt="Right">
        </div>
        
        <div class="user-info">目前使用者代號：<span onclick="resetUser()" id="displayUser">載入中...</span></div>
        <div id="loader">⌛ 同步雲端資料中...</div>
        
        <button class="add-btn" onclick="openEditor()">＋ 新增病患個資</button>
        <div id="patientList"></div>
    </div>

    <div id="editor" onclick="if(event.target==this)closeEditor()">
        <div class="modal">
            <h3 id="mTitle" style="margin:0">編輯資料</h3>
            <input type="hidden" id="eId">
            <label>病患姓名</label><input type="text" id="eName">
            <label>床號</label><input type="text" id="eBed">
            <label>管路類型</label>
            <select id="eType">
                <option value="NG">NG</option><option value="Foley">Foley</option>
                <option value="PCND">PCND</option><option value="Tr">Tr</option>
                <option value="Port-A">Port-A</option><option value="PICC">PICC</option>
                <option value="Pigtail">Pigtail</option><option value="PTCD">PTCD</option>
            </select>
            <div style="display:flex; gap:10px">
                <div style="flex:1"><label>置放日期</label><input type="date" id="eStartDate"></div>
                <div style="flex:1"><label>到期日期</label><input type="date" id="eDate"></div>
            </div>
            <label>主治醫師</label><input type="text" id="eDr">
            <label>診斷項目</label><input type="text" id="eDiag">
            <label>身份</label><input type="text" id="eStatus">
            <label>備註事項</label><textarea id="eMemo" style="height:60px"></textarea>
            <div class="btn-group">
                <button class="cancel" onclick="closeEditor()">取消</button>
                <button class="save" onclick="save()">儲存同步</button>
            </div>
            <button style="background:none; color:var(--danger); width:100%; margin-top:15px; border:none; font-size:13px;" onclick="del()">⚠️ 刪除此紀錄</button>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/3rgwakwkhx1vz"; 
        let pList = [];
        let myID = localStorage.getItem('csmu_user_id');

        // 多用戶初始化
        if (!myID) {
            myID = prompt("請輸入您的專屬代號（將用來區隔您的資料）：");
            if (!myID) myID = "Guest";
            localStorage.setItem('csmu_user_id', myID);
        }
        document.getElementById('displayUser').innerText = myID;

        function resetUser() {
            const newID = prompt("更換使用者代號：", myID);
            if (newID) { localStorage.setItem('csmu_user_id', newID); location.reload(); }
        }

        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('splash-screen').classList.add('splash-hidden'), 2200);
            fetchFromCloud();
        });

        async function fetchFromCloud() {
            document.getElementById('loader').style.display = 'block';
            try {
                // 核心：只抓取屬於自己的資料
                const res = await fetch(`${API_URL}/search?owner=${myID}`);
                pList = await res.json();
                render();
            } catch (e) { console.error("同步失敗"); }
            document.getElementById('loader').style.display = 'none';
        }

        function render() {
            const container = document.getElementById('patientList');
            const now = new Date(); now.setHours(0,0,0,0);
            pList.sort((a, b) => (new Date(a.date) - new Date(b.date)));
            container.innerHTML = pList.length ? pList.map(item => {
                let isUrgent = false; let statusLabel = '追蹤中';
                if (item.date) {
                    const diffDays = Math.ceil((new Date(item.date) - now) / 86400000);
                    if (diffDays <= 7) { isUrgent = true; statusLabel = diffDays < 0 ? '⚠️ 已逾期' : `⚠️ ${diffDays}天內`; }
                }
                return `
                    <div class="patient-item ${isUrgent ? 'urgent' : ''}" onclick="openEditor('${item.id}')">
                        <div class="info"><b>${item.name || '未命名'} (${item.bed || '--'})</b><span class="tube-tag">${item.type}</span></div>
                        <div class="status-badge">${statusLabel}</div>
                        <div class="date-grid">
                            <div class="date-row"><span class="date-label">到期</span><span class="date-value">${item.date || '--'}</span></div>
                            <div class="date-row"><span class="date-label">醫生</span><span class="date-value">${item.dr || '--'}</span></div>
                            <div class="date-row"><span class="date-label">診斷</span><span class="date-value">${item.diag || '--'}</span></div>
                            <div class="date-row"><span class="date-label">身份</span><span class="date-value">${item.status || '--'}</span></div>
                        </div>
                    </div>`;
            }).join('') : '<p style="text-align:center; color:#8E8E93; margin-top:50px;">目前您的清單無資料</p>';
        }

        async function save() {
            const id = document.getElementById('eId').value || Date.now().toString();
            const data = {
                id, name: document.getElementById('eName').value, bed: document.getElementById('eBed').value,
                dr: document.getElementById('eDr').value, diag: document.getElementById('eDiag').value,
                status: document.getElementById('eStatus').value, type: document.getElementById('eType').value,
                startdate: document.getElementById('eStartDate').value, date: document.getElementById('eDate').value,
                memo: document.getElementById('eMemo').value, owner: myID // 核心標記
            };
            document.getElementById('loader').style.display = 'block';
            if (document.getElementById('eId').value) await fetch(`${API_URL}/id/${id}`, { method: 'DELETE' });
            await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: [data] }) });
            fetchFromCloud(); closeEditor();
        }

        async function del() {
            const id = document.getElementById('eId').value;
            if (id && confirm("確定要刪除嗎？")) {
                document.getElementById('loader').style.display = 'block';
                await fetch(`${API_URL}/id/${id}`, { method: 'DELETE' });
                fetchFromCloud(); closeEditor();
            }
        }

        function openEditor(id = null) {
            document.getElementById('editor').style.display = 'flex';
            const fields = ['eId','eName','eBed','eDr','eDiag','eStatus','eType','eStartDate','eDate','eMemo'];
            if (id) {
                const cur = pList.find(i => i.id == id);
                fields.forEach(f => { const key = f.replace('e', '').toLowerCase(); document.getElementById(f).value = cur[key] || ""; });
            } else { fields.forEach(f => document.getElementById(f).value = ""); }
        }
        function closeEditor() { document.getElementById('editor').style.display = 'none'; }
    </script>
</body>
</html>
