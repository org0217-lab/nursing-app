<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中山醫管路維護雲端版</title>


<div style="background:#FFF9C4; padding:20px; border-bottom:3px solid #FBC02D; font-family:sans-serif;">
    <h3 style="margin:0 0 10px 0; color:#F57F17;">✨ 舊資料自動修復搬家工具</h3>
    <p style="font-size:14px; color:#333;">請直接貼上妳剛才那串文字（包含反斜線也沒關係）：</p>
    <textarea id="importBox" style="width:100%; height:120px; border-radius:10px; border:1px solid #FBC02D; padding:10px;" placeholder="在此貼上內容..."></textarea>
    
    <button onclick="superCleanImport()" id="moveBtn" style="width:100%; padding:15px; background:#F57F17; color:white; border:none; margin-top:15px; border-radius:10px; font-weight:bold; font-size:16px;">
        點我修復並開始搬家
    </button>
    <p id="msg" style="text-align:center; font-size:13px; color:#E65100; margin-top:10px;"></p>
</div>

<script>
// ⚠️ 確保這裡是妳的 API 網址
const API_URL = "https://sheetdb.io/api/v1/3rgwakwkhx1vz"; 

async function superCleanImport() {
    const btn = document.getElementById('moveBtn');
    const msg = document.getElementById('msg');
    let raw = document.getElementById('importBox').value;
    
    if(!raw) return alert("請貼上文字內容！");

    btn.disabled = true;
    btn.innerText = "正在修復格式...";

    try {
        // 1. 強力清洗：移除所有的反斜線，並修正被轉義的引號
        let cleaned = raw.replace(/\\"/g, '"').replace(/\\/g, '');
        
        // 2. 尋找 JSON 方括號區塊
        const jsonMatch = cleaned.match(/\[.*\]/s);
        if(!jsonMatch) throw new Error("找不到有效的資料方括號 [ ]");
        
        const dataArray = JSON.parse(jsonMatch[0]);
        
        // 3. 開始同步
        let count = 0;
        for(let item of dataArray) {
            // 重新整理資料格式，確保沒有多餘的空白
            const finalData = {
                id: Date.now().toString() + count,
                name: item.name || "",
                bed: item.bed || "",
                type: item.type || "",
                startdate: item.startdate || "",
                date: item.date || "",
                dr: item.dr || "",
                diag: item.diag || "",
                memo: item.memo || ""
            };

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [finalData] })
            });
            count++;
            msg.innerText = `成功修復並同步第 ${count} 筆資料...`;
        }

        alert(`太棒了！成功修復並搬移 ${count} 筆資料到雲端。`);
        location.reload();
    } catch(e) {
        console.error(e);
        alert("搬家還是失敗了！原因：" + e.message + "\n請確認貼上的文字最前面有 [ 最後面有 ]");
        btn.disabled = false;
        btn.innerText = "點我修復並開始搬家";
    }
}
</script>



    
    <style>
        :root { --primary: #007AFF; --danger: #FF3B30; --success: #34C759; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 12px; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: white; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header img { height: 45px; width: 45px; object-fit: cover; border-radius: 10px; }
        .header h2 { margin: 0; font-size: 18px; flex-grow: 1; text-align: center; font-weight: 800; }
        .add-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        .patient-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 8px solid var(--success); position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .patient-item.urgent { border-left-color: var(--danger); background: #FFF5F5; }
        .tube-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 5px; background: #E5E5EA; }
        .tag-NG { background: #87CEEB; } .tag-Foley { background: #FFFF00; }
        #loader { display: none; text-align: center; color: var(--primary); font-weight: bold; margin-bottom: 10px; }
        /* 編輯視窗樣式略... (保持與之前一致) */
        #editor { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal { background: white; width: 92%; padding: 20px; border-radius: 20px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #D1D1D6; border-radius: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .save { background: var(--primary); color: white; flex: 2; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
        .cancel { background: #E5E5EA; flex: 1; border: none; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="logo2.png" alt="Left Logo">
            <h2>管路維護雲端版</h2>
            <img src="logo.png" alt="Right Logo">
        </div>
        <div id="loader">⌛ 同步中...</div>
        <button class="add-btn" onclick="openEditor()">＋ 新增病患個資</button>
        <div id="patientList"></div>
    </div>

    <div id="editor" onclick="if(event.target==this)closeEditor()">
        <div class="modal">
            <h3 id="mTitle" style="margin:0">編輯資料</h3>
            <input type="hidden" id="eId">
            <label>病患姓名</label><input type="text" id="eName">
            <label>床號</label><input type="text" id="eBed">
            <label>管路類型</label>
            <select id="eType">
                <option value="NG">NG</option><option value="Foley">Foley</option>
                <option value="PCND">PCND</option><option value="Tr">Tr</option>
                <option value="Port-A">Port-A</option><option value="PICC">PICC</option>
                <option value="Pigtail">Pigtail</option><option value="PTCD">PTCD</option>
            </select>
            <div style="display:flex; gap:10px">
                <div style="flex:1"><label>置放日</label><input type="date" id="eStartDate"></div>
                <div style="flex:1"><label>到期日</label><input type="date" id="eDate"></div>
            </div>
            <label>醫師</label><input type="text" id="eDr">
            <label>診斷</label><input type="text" id="eDiag">
            <label>備註</label><textarea id="eMemo"></textarea>
            <div class="btn-group">
                <button class="cancel" onclick="closeEditor()">取消</button>
                <button class="save" onclick="save()">儲存同步</button>
            </div>
            <button style="background:none; color:var(--danger); width:100%; margin-top:15px; border:none;" onclick="del()">⚠️ 刪除紀錄</button>
        </div>
    </div>

    <script>
        // ⚠️ 這裡請換成妳在 SheetDB 申請的 API 網址
        const API_URL = "https://sheetdb.io/api/v1/3rgwakwkhx1vz"; 
        let pList = [];

        async function fetchFromCloud() {
            document.getElementById('loader').style.display = 'block';
            try {
                const res = await fetch(API_URL);
                pList = await res.json();
                render();
            } catch (e) { alert("讀取雲端失敗"); }
            document.getElementById('loader').style.display = 'none';
        }

        function render() {
            const container = document.getElementById('patientList');
            const now = new Date(); now.setHours(0,0,0,0);
            pList.sort((a, b) => new Date(a.date) - new Date(b.date));
            container.innerHTML = pList.map(item => {
                let isUrgent = false;
                if (item.date) {
                    const diff = Math.ceil((new Date(item.date) - now) / 86400000);
                    if (diff <= 7) isUrgent = true;
                }
                return `
                    <div class="patient-item ${isUrgent ? 'urgent' : ''}" onclick="openEditor('${item.id}')">
                        <b>${item.name} (${item.bed || '--'})</b><br>
                        <span class="tube-tag tag-${item.type}">${item.type}</span><br>
                        <small>到期：${item.date || '--'}</small>
                    </div>`;
            }).join('');
        }

        async function save() {
            const id = document.getElementById('eId').value || Date.now().toString();
            const data = {
                id, name: document.getElementById('eName').value,
                bed: document.getElementById('eBed').value,
                type: document.getElementById('eType').value,
                startdate: document.getElementById('eStartDate').value,
                date: document.getElementById('eDate').value,
                dr: document.getElementById('eDr').value,
                diag: document.getElementById('eDiag').value,
                memo: document.getElementById('eMemo').value
            };

            document.getElementById('loader').style.display = 'block';
            // 如果是編輯，先刪除舊的
            if (document.getElementById('eId').value) {
                await fetch(`${API_URL}/id/${id}`, { method: 'DELETE' });
            }
            // 新增
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [data] })
            });
            await fetchFromCloud();
            closeEditor();
        }

        async function del() {
            const id = document.getElementById('eId').value;
            if (id && confirm("確定刪除雲端資料？")) {
                await fetch(`${API_URL}/id/${id}`, { method: 'DELETE' });
                await fetchFromCloud();
                closeEditor();
            }
        }

        function openEditor(id = null) {
            document.getElementById('editor').style.display = 'flex';
            if (id) {
                const cur = pList.find(i => i.id == id);
                document.getElementById('eId').value = cur.id;
                document.getElementById('eName').value = cur.name;
                document.getElementById('eBed').value = cur.bed;
                document.getElementById('eType').value = cur.type;
                document.getElementById('eStartDate').value = cur.startdate;
                document.getElementById('eDate').value = cur.date;
                document.getElementById('eDr').value = cur.dr;
                document.getElementById('eDiag').value = cur.diag;
                document.getElementById('eMemo').value = cur.memo;
            } else {
                document.getElementById('eId').value = "";
                document.getElementById('eName').value = "";
            }
        }
        function closeEditor() { document.getElementById('editor').style.display = 'none'; }
        fetchFromCloud();
    </script>
</body>
</html>
